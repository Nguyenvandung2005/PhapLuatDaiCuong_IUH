<head>

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff}

.stats-bar{display:flex;justify-content:center;gap:30px;padding:15px;background:rgba(0,0,0,0.3);flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-size:1.5rem;font-weight:700;color:#34d399}
.stat-lbl{font-size:0.75rem;color:rgba(255,255,255,0.5);text-transform:uppercase}
.controls{display:flex;justify-content:center;gap:12px;padding:16px;flex-wrap:wrap}
.btn{padding:10px 22px;border:none;border-radius:25px;cursor:pointer;font-size:0.9rem;font-weight:600;transition:all 0.3s}
.btn-primary{background:linear-gradient(135deg,#34d399,#60a5fa);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.3)}
.btn-outline{background:transparent;border:2px solid #34d399;color:#34d399}
.btn-outline:hover{background:#34d399;color:#fff}
.quiz-container{max-width:860px;margin:0 auto;padding:20px}
.progress-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#34d399,#60a5fa);transition:width 0.4s ease}
.question-card{background:rgba(255,255,255,0.07);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;margin-bottom:18px;transition:all 0.3s}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.q-num{background:linear-gradient(135deg,#34d399,#60a5fa);color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0}
.q-text{font-size:1rem;line-height:1.6;color:#e8e8ff;flex:1;margin-left:14px}
.options{display:grid;gap:10px;margin-top:14px}
.option{display:flex;align-items:center;padding:12px 16px;background:rgba(255,255,255,0.05);border:2px solid transparent;border-radius:12px;cursor:pointer;transition:all 0.25s;gap:12px}
.option:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
.option.selected{border-color:#34d399;background:rgba(99,102,241,0.15)}
.option.correct{border-color:#10b981;background:rgba(16,185,129,0.15)}
.option.wrong{border-color:#ef4444;background:rgba(239,68,68,0.15)}
.opt-badge{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0;color:#ccc}
.option.selected .opt-badge{background:#34d399;color:#fff}
.option.correct .opt-badge{background:#10b981;color:#fff}
.option.wrong .opt-badge{background:#ef4444;color:#fff}
.opt-text{font-size:0.9rem;line-height:1.5;color:rgba(255,255,255,0.85)}
.result-box{display:none;margin-top:10px;padding:10px 14px;border-radius:10px;font-size:0.85rem}
.result-box.show{display:block}
.result-correct{background:rgba(16,185,129,0.2);border:1px solid #10b981;color:#6ee7b7}
.result-wrong{background:rgba(239,68,68,0.2);border:1px solid #ef4444;color:#fca5a5}

.modal.show{display:flex}
.modal-box{background:linear-gradient(135deg,#1e1b4b,#312e81);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:40px;text-align:center;max-width:440px;width:90%}
.modal-box h2{font-size:1.8rem;margin-bottom:8px;background:linear-gradient(90deg,#34d399,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-big{font-size:4rem;font-weight:800;color:#34d399;line-height:1}
.score-lbl{color:rgba(255,255,255,0.6);margin-top:6px;margin-bottom:24px}
.filter-tabs{display:flex;justify-content:center;gap:8px;padding:12px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;font-size:0.85rem;transition:all 0.2s}
.tab.active{background:linear-gradient(135deg,#34d399,#60a5fa);border-color:transparent;color:#fff}
.empty{text-align:center;padding:60px;color:rgba(255,255,255,0.4)}
.search-box{max-width:860px;margin:0 auto;padding:0 20px 12px}
.search-input{width:100%;padding:12px 18px;border-radius:25px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:#fff;font-size:0.9rem;outline:none}
.search-input::placeholder{color:rgba(255,255,255,0.3)}
.search-input:focus{border-color:#34d399}
.pagination{display:flex;justify-content:center;gap:8px;padding:20px;flex-wrap:wrap}
.page-btn{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#fff;cursor:pointer;font-size:0.85rem;transition:all 0.2s}
.page-btn:hover,.page-btn.active{background:linear-gradient(135deg,#34d399,#60a5fa);border-color:transparent}
</style>
</head>
<body>
<div class="header">
  <h1>🎓 Trắc Nghiệm Pháp Luật Đại Cương - 100 Câu</h1>
  <p>Bộ câu hỏi tổng hợp môn Pháp luật đại cương</p>
</div>
<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="totalQ">0</div><div class="stat-lbl">Tổng câu</div></div>
  <div class="stat"><div class="stat-num" id="answeredQ">0</div><div class="stat-lbl">Đã trả lời</div></div>
  <div class="stat"><div class="stat-num" id="correctQ" style="color:#10b981">0</div><div class="stat-lbl">Đúng</div></div>
  <div class="stat"><div class="stat-num" id="wrongQ" style="color:#ef4444">0</div><div class="stat-lbl">Sai</div></div>
  <div class="stat"><div class="stat-num" id="pctQ">0%</div><div class="stat-lbl">Tỷ lệ đúng</div></div>
</div>
<div class="controls">
  <button class="btn btn-primary" onclick="submitAll()">✅ Nộp bài</button>
  <button class="btn btn-outline" onclick="resetAll()">🔄 Làm lại</button>
  <button class="btn btn-outline" onclick="shuffleQuestions()">🔀 Trộn câu</button>
  <button class="btn btn-outline" onclick="showAll()">📋 Hiện đáp án</button>
</div>
<div class="filter-tabs">
  <button class="tab active" onclick="filterTab('all',this)">Tất cả</button>
  <button class="tab" onclick="filterTab('unanswered',this)">Chưa trả lời</button>
  <button class="tab" onclick="filterTab('correct',this)">Đúng</button>
  <button class="tab" onclick="filterTab('wrong',this)">Sai</button>
</div>
<div class="search-box">
  <input class="search-input" id="searchInput" placeholder="🔍 Tìm kiếm câu hỏi..." oninput="handleSearch()">
</div>
<div class="progress-bar" style="max-width:860px;margin:0 auto 4px;padding:0 20px">
  <div style="height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>
<div class="quiz-container" id="quizContainer"></div>
<div class="pagination" id="pagination"></div>
<div class="modal" id="resultModal">
  <div class="modal-box">
    <h2>📊 Kết Quả</h2>
    <div class="score-big" id="modalScore">0</div>
    <div class="score-lbl" id="modalDetail"></div>
    <div style="margin-bottom:20px;font-size:2rem" id="modalEmoji">🎉</div>
    <button class="btn btn-primary" onclick="closeModal()" style="width:100%">Xem lại bài</button>
    <button class="btn btn-outline" onclick="resetAll()" style="width:100%;margin-top:10px">Làm lại</button>
  </div>
</div>

const PAGE_SIZE = 20;
let userAnswers = {};
let revealed = {};
let currentFilter = 'all';
let currentSearch = '';
let currentPage = 1;
let filtered = [];

function getFiltered() {
  let qs = QUESTIONS.map((q,i)=>({...q,idx:i}));
  if(currentFilter==='unanswered') qs=qs.filter(q=>!userAnswers[q.idx]);
  else if(currentFilter==='correct') qs=qs.filter(q=>userAnswers[q.idx]&&q.a&&userAnswers[q.idx]===q.a);
  else if(currentFilter==='wrong') qs=qs.filter(q=>userAnswers[q.idx]&&q.a&&userAnswers[q.idx]!==q.a);
  if(currentSearch) qs=qs.filter(q=>q.q.toLowerCase().includes(currentSearch.toLowerCase()));
  return qs;
}

function render() {
  filtered = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filtered.length/PAGE_SIZE));
  if(currentPage>totalPages) currentPage=1;
  const pageItems = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  
  const container = document.getElementById('quizContainer');
  if(pageItems.length===0){container.innerHTML='<div class="empty">Không có câu hỏi phù hợp</div>';return;}
  
  container.innerHTML = pageItems.map((q,pi)=>{
    const qi = q.idx;
    const ua = userAnswers[qi];
    const rv = revealed[qi];
    const opts = ['A','B','C','D'].filter(k=>q.o[k]);
    
    return `<div class="question-card" id="qcard-${qi}">
      <div class="q-header">
        <div class="q-num">${(currentPage-1)*PAGE_SIZE+pi+1}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options">
        ${opts.map(k=>{
          let cls='option';
          if(ua===k){
            if(rv||q.a){cls+= (q.a&&k===q.a)?' correct':' wrong';}
            else cls+=' selected';
          } else if((rv||q.a)&&q.a&&k===q.a) cls+=' correct';
          return `<div class="${cls}" onclick="choose(${qi},'${k}')" id="opt-${qi}-${k}">
            <div class="opt-badge">${k}</div>
            <div class="opt-text">${q.o[k]}</div>
          </div>`;
        }).join('')}
      </div>
      ${(ua&&q.a)?`<div class="result-box show ${ua===q.a?'result-correct':'result-wrong'}">${ua===q.a?'✅ Chính xác!':'❌ Sai rồi! Đáp án đúng: <strong>'+q.a+'</strong>'}</div>`:''}</div>`;
  }).join('');
  
  renderPagination(totalPages);
  updateStats();
}

function renderPagination(total) {
  const p = document.getElementById('pagination');
  if(total<=1){p.innerHTML='';return;}
  let html='';
  for(let i=1;i<=total;i++) html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  p.innerHTML=html;
}

function goPage(n){currentPage=n;render();window.scrollTo(0,0);}

function choose(qi, key){
  if(revealed[qi]) return;
  userAnswers[qi]=key;
  render();
}

function updateStats(){
  const total=QUESTIONS.length;
  const answered=Object.keys(userAnswers).length;
  const correct=QUESTIONS.filter((q,i)=>q.a&&userAnswers[i]===q.a).length;
  const wrong=QUESTIONS.filter((q,i)=>q.a&&userAnswers[i]&&userAnswers[i]!==q.a).length;
  const pct=answered>0?Math.round(correct/answered*100):0;
  document.getElementById('totalQ').textContent=total;
  document.getElementById('answeredQ').textContent=answered;
  document.getElementById('correctQ').textContent=correct;
  document.getElementById('wrongQ').textContent=wrong;
  document.getElementById('pctQ').textContent=pct+'%';
  document.getElementById('progressFill').style.width=(answered/total*100)+'%';
}

function filterTab(f, el){
  currentFilter=f; currentPage=1;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function handleSearch(){
  currentSearch=document.getElementById('searchInput').value;
  currentPage=1; render();
}

function submitAll(){
  const total=QUESTIONS.length;
  const answered=Object.keys(userAnswers).length;
  const withAns=QUESTIONS.filter((q,i)=>q.a).length;
  const correct=QUESTIONS.filter((q,i)=>q.a&&userAnswers[i]===q.a).length;
  if(answered<total*0.5 && !confirm('Bạn mới trả lời '+answered+'/'+total+' câu. Tiếp tục nộp bài?')) return;
  QUESTIONS.forEach((_,i)=>revealed[i]=true);
  const pct=withAns>0?Math.round(correct/withAns*100):0;
  document.getElementById('modalScore').textContent=pct+'%';
  document.getElementById('modalDetail').textContent=correct+'/'+withAns+' câu đúng';
  document.getElementById('modalEmoji').textContent=pct>=80?'🏆':pct>=60?'👍':'📚';
  document.getElementById('resultModal').classList.add('show');
  render();
}

function closeModal(){document.getElementById('resultModal').classList.remove('show');}

function resetAll(){
  userAnswers={};revealed={};
  closeModal();currentFilter='all';currentPage=1;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  render();
}

function shuffleQuestions(){
  for(let i=QUESTIONS.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [QUESTIONS[i],QUESTIONS[j]]=[QUESTIONS[j],QUESTIONS[i]];
  }
  userAnswers={};revealed={};currentPage=1;render();
}

function showAll(){
  QUESTIONS.forEach((_,i)=>revealed[i]=true);
  render();
}

render();
</script>
</body>
</html>
