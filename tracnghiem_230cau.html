<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff}
.header{text-align:center;padding:40px 20px 20px;background:rgba(255,255,255,0.05);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.1)}
.header h1{font-size:2rem;background:linear-gradient(90deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.header p{color:rgba(255,255,255,0.6);font-size:0.95rem}
.stats-bar{display:flex;justify-content:center;gap:30px;padding:15px;background:rgba(0,0,0,0.3);flex-wrap:wrap}
.stat{text-align:center}
.stat-num{font-size:1.5rem;font-weight:700;color:#818cf8}
.stat-lbl{font-size:0.75rem;color:rgba(255,255,255,0.5);text-transform:uppercase}
.controls{display:flex;justify-content:center;gap:12px;padding:16px;flex-wrap:wrap}
.btn{padding:10px 22px;border:none;border-radius:25px;cursor:pointer;font-size:0.9rem;font-weight:600;transition:all 0.3s}
.btn-primary{background:linear-gradient(135deg,#818cf8,#c084fc);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,0.3)}
.btn-outline{background:transparent;border:2px solid #818cf8;color:#818cf8}
.btn-outline:hover{background:#818cf8;color:#fff}
.quiz-container{max-width:860px;margin:0 auto;padding:20px}
.progress-bar{height:6px;background:rgba(255,255,255,0.1);border-radius:3px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#818cf8,#c084fc);transition:width 0.4s ease}
.question-card{background:rgba(255,255,255,0.07);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:28px;margin-bottom:18px;transition:all 0.3s}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.q-num{background:linear-gradient(135deg,#818cf8,#c084fc);color:#fff;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;flex-shrink:0}
.q-text{font-size:1rem;line-height:1.6;color:#e8e8ff;flex:1;margin-left:14px}
.options{display:grid;gap:10px;margin-top:14px}
.option{display:flex;align-items:center;padding:12px 16px;background:rgba(255,255,255,0.05);border:2px solid transparent;border-radius:12px;cursor:pointer;transition:all 0.25s;gap:12px}
.option:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
.option.selected{border-color:#818cf8;background:rgba(99,102,241,0.15)}
.option.correct{border-color:#10b981;background:rgba(16,185,129,0.15)}
.option.wrong{border-color:#ef4444;background:rgba(239,68,68,0.15)}
.opt-badge{width:28px;height:28px;border-radius:8px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0;color:#ccc}
.option.selected .opt-badge{background:#818cf8;color:#fff}
.option.correct .opt-badge{background:#10b981;color:#fff}
.option.wrong .opt-badge{background:#ef4444;color:#fff}
.opt-text{font-size:0.9rem;line-height:1.5;color:rgba(255,255,255,0.85)}
.result-box{display:none;margin-top:10px;padding:10px 14px;border-radius:10px;font-size:0.85rem}
.result-box.show{display:block}
.result-correct{background:rgba(16,185,129,0.2);border:1px solid #10b981;color:#6ee7b7}
.result-wrong{background:rgba(239,68,68,0.2);border:1px solid #ef4444;color:#fca5a5}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:linear-gradient(135deg,#1e1b4b,#312e81);border:1px solid rgba(255,255,255,0.2);border-radius:20px;padding:40px;text-align:center;max-width:440px;width:90%}
.modal-box h2{font-size:1.8rem;margin-bottom:8px;background:linear-gradient(90deg,#818cf8,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.score-big{font-size:4rem;font-weight:800;color:#818cf8;line-height:1}
.score-lbl{color:rgba(255,255,255,0.6);margin-top:6px;margin-bottom:24px}
.filter-tabs{display:flex;justify-content:center;gap:8px;padding:12px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.2);background:transparent;color:rgba(255,255,255,0.7);cursor:pointer;font-size:0.85rem;transition:all 0.2s}
.tab.active{background:linear-gradient(135deg,#818cf8,#c084fc);border-color:transparent;color:#fff}
.empty{text-align:center;padding:60px;color:rgba(255,255,255,0.4)}
.search-box{max-width:860px;margin:0 auto;padding:0 20px 12px}
.search-input{width:100%;padding:12px 18px;border-radius:25px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.07);color:#fff;font-size:0.9rem;outline:none}
.search-input::placeholder{color:rgba(255,255,255,0.3)}
.search-input:focus{border-color:#818cf8}
.pagination{display:flex;justify-content:center;gap:8px;padding:20px;flex-wrap:wrap}
.page-btn{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,0.2);background:transparent;color:#fff;cursor:pointer;font-size:0.85rem;transition:all 0.2s}
.page-btn:hover,.page-btn.active{background:linear-gradient(135deg,#818cf8,#c084fc);border-color:transparent}
</style>
</head>
<body>
<div class="header">
  <h1>🎓 Trắc Nghiệm Pháp Luật Đại Cương - 230 Câu</h1>

</div>
<div class="stats-bar">
  <div class="stat"><div class="stat-num" id="totalQ">0</div><div class="stat-lbl">Tổng câu</div></div>
  <div class="stat"><div class="stat-num" id="answeredQ">0</div><div class="stat-lbl">Đã trả lời</div></div>

</div>
<div class="search-box">

</div>
<div class="progress-bar" style="max-width:860px;margin:0 auto 4px;padding:0 20px">

    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
</div>
<div class="quiz-container" id="quizContainer"></div>
<div class="pagination" id="pagination"></div>
<div class="modal" id="resultModal">

    <div class="score-big" id="modalScore">0</div>
    <div class="score-lbl" id="modalDetail"></div>
    <div style="margin-bottom:20px;font-size:2rem" id="modalEmoji">🎉</div>
    <button class="btn btn-primary" onclick="closeModal()" style="width:100%">Xem lại bài</button>
    <button class="btn btn-outline" onclick="resetAll()" style="width:100%;margin-top:10px">Làm lại</button>
  </div>
</div>
<script>
const QUESTIONS = [
  {q:"Việt Nam từ năm 1946 đến nay đã có những bản Hiến pháp nào?",o:{A:"1946, 1954, 1975, 1992, 2001",B:"1946, 1959, 1975, 1992, 2001",C:"1946, 1959, 1980, 1992, 2013",D:"1946, 1959, 1980, 2001, 2013"},a:"C"},
  {q:"Nhà nước Cộng hòa xã hội chủ nghĩa Việt Nam là nhà nước ........",o:{A:"pháp quyền xã hội chủ nghĩa của dân, do dân, vì dân",B:"xã hội chủ nghĩa của Nhân dân, do Nhân dân, vì Nhân dân",C:"xã hội chủ nghĩa của dân, do dân, vì dân",D:"pháp quyền xã hội chủ nghĩa của Nhân dân, do Nhân dân, vì Nhân dân"},a:"B"},

  {q:"Nhà nước liên bang là nhà nước của các quốc gia",o:{A:"Việt Nam, Nga, Trung Quốc",B:"Hoa Kỳ, Nga, Đức",C:"Hoa Kỳ, Nga, Triều Tiên",D:"Ucraina, Nga, Trung Quốc"},a:"B"},
  {q:"Việc bầu cử đại biểu Quốc hội và đại biểu Hội đồng nhân dân được tiến hành theo các nguyên tắc ....",o:{A:"phổ thông, bình đẳng, gián tiếp và bỏ phiếu kín.",B:"phổ thông, bình đẳng, trực tiếp và bỏ phiếu công khai.",C:"phổ thông, bình đẳng, trực tiếp và bỏ phiếu kín.",D:"phổ thông, bình đẳng, gián tiếp và bỏ phiếu công khai."},a:"C"},
  {q:"Quốc hội là ....",o:{A:"cơ quan đại biểu của Nhân dân, cơ quan quyền lực nhà nước của nước Cộng hòa xã hội chủ nghĩa Việt Nam.",B:"cơ quan đại biểu cao nhất của Nhân dân, cơ quan quyền lực nhà nước của nước Cộng hòa xã hội chủ nghĩa Việt Nam.",C:"cơ quan đại biểu của Nhân dân, cơ quan quyền lực nhà nước cao nhất của nước Cộng hòa xã hội chủ nghĩa Việt Nam.",D:"cơ quan đại biểu cao nhất của Nhân dân, cơ quan quyền lực nhà nước cao nhất của nước Cộng hòa xã hội chủ nghĩa Việt Nam."},a:"D"},
  {q:"Chủ tịch nước, Phó Chủ tịch nước, Thủ tướng Chính phủ",o:{A:"do nhân dân bầu, miễn nhiệm, bãi nhiệm.",B:"do Quốc hội bầu, miễn nhiệm.",C:"do Đảng bầu, miễn nhiệm, bãi nhiệm.",D:"do Quốc hội bầu, miễn nhiệm, bãi nhiệm."},a:"D"},
  {q:"Chế độ chính trị có các loại chính là ....",o:{A:"Chế độ chính trị tư sản và chế độ chính trị cộng hòa dân chủ",B:"Chế độ chính trị dân chủ và chế độ chính trị phản dân chủ",C:"Chế độ chính trị dân chủ và chế độ chính trị xã hội chủ nghĩa",D:"Cả 3 câu trên đều sai"},a:"B"},
  {q:"Hệ thống chính trị Việt Nam bao gồm:",o:{A:"Đảng cộng sản Việt Nam; Chính phủ; Mặt trận tổ quốc Việt Nam và các thành viên.",B:"Đảng cộng sản Việt Nam; Nhà nước Cộng hòa xã hội chủ nghĩa Việt Nam; Quốc hội.",C:"Đảng cộng sản Việt Nam; Nhà nước Cộng hòa xã hội chủ nghĩa Việt Nam; Mặt trận tổ quốc Việt Nam và các thành viên.",D:"Đảng cộng sản Việt Nam; Quốc hội; Mặt trận tổ quốc Việt Nam và các thành viên."},a:"C"},
  {q:"Quan hệ pháp luật hành chính là...",o:{A:"quan hệ bình đẳng B quan hệ phục tùng",C:"quan hệ thỏa thuận",D:"Tất cả các"},a:"A"},
  {q:"Nguyên tắc xây dựng tam quyền phân lập là của...",o:{A:"Nhà nước tư sản.",B:"Nhà nước xã hội chủ nghĩa.",C:"Nhà nước chủ nô.",D:"Nhà nước phong kiến."},a:"A"},

  {q:"Kể từ thời điểm mở thừa kế...",o:{A:"những người thừa kế có các quyền tài sản do người chết để lại.",B:"những người thừa kế có các nghĩa vụ tài sản do người chết để lại.",C:"những người thừa kế có các quyền, nghĩa vụ tài sản do người chết để lại.",D:"Cả 3 câu trên đều sai."},a:"C"},

  {q:"Tái thẩm là xét lại bản án, quyết định đã có hiệu lực pháp luật của Tòa án vì ............. được phát hiện có thể làm thay đổi cơ bản nội dung của bản án, quyết định mà Tòa án không biết được khi ra bản án, quyết định đó.",o:{A:"bị khiếu nại",B:"bị kháng cáo",C:"bị kháng nghị",D:"có tình tiết mới"},a:"D"},
  {q:"Đối tượng điều chỉnh của Luật hôn nhân và gia đình năm 2014 là: Câu hỏi",o:{A:"quan hệ nhân thân và tài sản giữa vợ, chồng",B:"quan hệ nhân thân và tài sản giữa cha mẹ và con.",C:"quan hệ nhân thân và tài sản giữa vợ, chồng và quan hệ nhân thân và tài sản giữa cha mẹ và con, các thành viên khác trong gia đình",D:"quan hệ nhân thân và tài sản giữa các thành viên trong gia đình"},a:"C"},
  {q:"Kết hôn là việc nam và nữ xác lập quan hệ vợ chồng với nhau theo quy định của Luật Hôn nhân và gia đình về............................",o:{A:"điều kiện kết hôn và đăng ký kết hôn",B:"điều kiện kết hôn",C:"đăng ký kết hôn.",D:"tuổi kết hôn, điều kiện kết hôn và đăng ký kết hôn."},a:"A"},
  {q:"Kết hôn trái pháp luật là việc nam, nữ .........................tại cơ quan nhà nước có thẩm quyền nhưng một bên hoặc cả hai bên vi phạm điều kiện kết hôn",o:{A:"không đăng ký kết hôn",B:"đã đăng ký kết hôn",C:"cả 2 câu trên đều sai",D:"cả 2 câu trên đều đúng"},a:"B"},
  {q:"Hậu quả pháp lý của việc hủy kết hôn trái pháp luật:",o:{A:"Quyền, nghĩa vụ của cha, mẹ, con có thể được giải quyết theo quy định về quyền, nghĩa vụ của cha, mẹ, con khi ly hôn.",B:"Quyền, nghĩa vụ của cha, mẹ, con trong một số trường hợp có thể được giải quyết theo quy định về quyền, nghĩa vụ của cha, mẹ, con khi ly hôn.",C:"Quyền, nghĩa vụ của cha, mẹ, con không được giải quyết theo quy định về quyền, nghĩa vụ của cha, mẹ, con khi ly hôn.",D:"Quyền, nghĩa vụ của cha, mẹ, con được giải quyết theo quy định về quyền, nghĩa vụ của cha, mẹ, con khi ly hôn."},a:"D"},
  {q:"Chồng không có quyền yêu cầu ly hôn trong trường hợp",o:{A:"vợ đang có thai",B:"vợ sinh con",C:"vợ đang nuôi con dưới 12 tháng tuổi",D:"vợ đang có thai, sinh con hoặc đang nuôi con dưới 12 tháng tuổi."},a:"D"},
  {q:"Nhà nước và xã hội ..............việc hòa giải ở cơ sở khi vợ, chồng có yêu cầu ly hôn. Việc hòa giải được thực hiện theo quy định của pháp luật về hòa giải ở cơ sở.",o:{A:"bắt buộc",B:"khuyến khích",C:"cả 2 câu trên đều đúng",D:"cả 2 câu trên đều sai"},a:"B"},
  {q:"Theo Luật hôn nhân và gia đình năm 2014, có 2 trường hợp ly hôn là:",o:{A:"thuận tình ly hôn và ly hôn theo yêu cầu của một bên",B:"thuận tình ly hôn và đơn phương ly hôn",C:"đồng thuận ly hôn và ly hôn theo yêu cầu của một bên",D:"đồng thuận ly hôn và đơn phương ly hôn"},a:"A"},
  {q:"Tòa án giải quyết cho ly hôn nếu có căn cứ về việc vợ, chồng có hành vi bạo lực gia đình hoặc vi phạm nghiêm trọng quyền, nghĩa vụ của vợ, chồng làm cho..............",o:{A:"con chưa thành niên",B:"con đã thành niên mất năng lực hành vi dân sự",C:"cả 2 câu trên đều đúng",D:"cả 2 câu trên đều sai"},a:"C"},
  {q:"Sau khi ly hôn, cha mẹ vẫn có quyền, nghĩa vụ trông nom, chăm sóc, nuôi dưỡng, giáo dục .................",o:{A:"con chưa thành niên",B:"con đã thành niên mất năng lực hành vi dân sự",C:"con không có khả năng lao động và không có tài sản để tự nuôi mình",D:"con chưa thành niên, con đã thành niên mất năng lực hành vi dân sự hoặc không có khả năng lao động và không có tài sản để tự nuôi mình"},a:"D"},
  {q:"Vi phạm hành chính là ........... vi phạm quy định của pháp luật về quản lý nhà nước mà không phải là tội phạm và theo quy định của pháp luật phải bị xử phạt vi phạm hành chính.",o:{A:"hành vi có lỗi do cá nhân thực hiện,",B:"hành vi có lỗi do tổ chức thực hiện,",C:"hành vi có lỗi do cá nhân, tổ chức thực hiện,",D:"hành vi có lỗi do cá nhân, tổ chức hoặc pháp nhân thực hiện"},a:"C"},
  {q:"Đặc điểm của hành vi vi phạm hành chính là:............................",o:{A:"Tính xâm hại nguyên tắc quản lý nhà nước",B:"Tính xâm hại nguyên tắc quản lý nhà nước, tính có lỗi",C:"Tính xâm hại nguyên tắc quản lý nhà nước, tính có lỗi, tính trái pháp luật hành chính, tính chịu xử phạt vi phạm hành chính hoặc bị xử lý hình sự.",D:"Tính xâm hại nguyên tắc quản lý nhà nước, tính có lỗi, tính trái pháp luật hành chính, tính chịu xử phạt vi phạm hành chính Câu hỏi"},a:"D"},
  {q:"Tố tụng hành chính là trình tự giải quyết vụ án hành chính theo quy định của pháp luật tại Tòa án nhằm giải quyết các ..............",o:{A:"khiếu kiện đối với các quyết định hành chính",B:"khiếu kiện đối với các hành vi hành chính",C:"khiếu kiện đối với các quyết định hành chính, hành vi hành chính của cơ quan nhà nước và của cán bộ, công chức thuộc những cơ quan này",D:"khiếu kiện hoặc khiếu nại đối với các quyết định hành chính, hành vi hành chính của cơ quan nhà nước và của cán bộ, công chức thuộc những cơ quan này"},a:"C"},
  {q:"Quyết định hành chính là quyết định bằng văn bản của cơ quan hành chính nhà nước hoặc của người có thẩm quyền trong cơ quan hành chính nhà nước được áp dụng ..................trong hoạt động quản lý hành chính.",o:{A:"1 lần đối với 1 đối tượng cụ thể về 1 vấn đề cụ thể",B:"1 lần đối với 1 số đối tượng cụ thể về 1 vấn đề cụ thể",C:"1 lần đối với 1 hoặc 1 số đối tượng cụ thể về 1 vấn đề cụ thể",D:"1 lần đối với 1 hoặc 1 số đối tượng cụ thể về 1 số vấn đề cụ thể"},a:"A"},
  {q:"Hành vi hành chính là hành vi của cơ quan hành chính nhà nước hoặc của người có thẩm quyền trong cơ quan hành chính nhà nước hoặc cơ quan, tổ chức được giao thực hiện quản lý hành chính nhà nước ..................theo quy định của pháp luật.",o:{A:"thực hiện nhiệm vụ",B:"thực hiện hoặc không thực hiện nhiệm vụ",C:"thực hiện nhiệm vụ, công vụ",D:"thực hiện hoặc không thực hiện nhiệm vụ, công vụ"},a:"C"},
  {q:"Quyết định kỷ luật buộc thôi việc là quyết định .............để áp dụng hình thức kỷ luật buộc thôi việc đối với công chức thuộc quyền quản lý của mình.",o:{A:"của người đứng đầu cơ quan, tổ chức",B:"bằng văn bản của người đứng đầu cơ quan, tổ chức",C:"bằng văn bản của người đứng đầu cơ quan",D:"Cả 3 câu trên đều sai"},a:"B"},
  {q:"Tòa án chỉ có thẩm quyền giải quyết khiếu kiện quyết định kỷ luật buộc thôi việc công chức giữ chức vụ từ ............... trở xuống.",o:{A:"Tổng Cục trưởng hoặc tương đương",B:"Bộ trưởng hoặc tương đương",C:"Thứ trưởng hoặc tương đương",D:"Tổng Cục trưởng"},a:"A"},
  {q:"Khởi kiện vụ án hành chính là việc cá nhân, tổ chức, cơ quan nhà nước, theo quy định của pháp luật tố tụng hành chính yêu cầu tòa án giải quyết vụ án hành chính để bảo vệ quyền, lợi ích hợp pháp của mình bị xâm hại bởi các ......................",o:{A:"quyết định hành chính, hành vi hành chính, quyết định kỷ luật buộc thôi việc.",B:"quyết định hành chính, hành vi hành chính",C:"quyết định hành chính, quyết định kỷ luật buộc thôi việc.",D:"quyết định hành chính, hành vi hành chính, quyết định kỷ luật buộc thôi việc và các quyết định khác."},a:"A"},
  {q:"Trong thời hạn............. kể từ ngày nhận được đơn yêu cầu của người được thi hành án hành chính. Tòa án đã xét xử sơ thẩm phải ra quyết định buộc thi hành án hành chính",o:{A:"03 ngày",B:"05 ngày làm việc",C:"05 ngày",D:"10 ngày làm việc"},a:"B"},
  {q:"Quan hệ tài sản là đối tượng điều chỉnh của luật dân sự có những đặc điểm sau: Câu hỏi",o:{A:"quyền và nghĩa vụ",B:"quyền dân sự và nghĩa vụ dân sự",C:"quyền dân sự và nghĩa vụ hợp pháp",D:"Cả 3 câu trên đều sai"},a:"B"},
  {q:"Năng lực hành vi dân sự của cá nhân là khả năng của cá nhân bằng hành vi của mình ............",o:{A:"xác lập, thực hiện quyền, nghĩa vụ dân sự.",B:"thực hiện quyền, nghĩa vụ dân sự.",C:"thực hiện quyền dân sự.",D:"xác lập, thực hiện quyền, nghĩa vụ"},a:"A"},
  {q:"Quyền chiếm hữu của chủ sở hữu có nghĩa là......",o:{A:"Chủ sở hữu được thực hiện mọi hành vi theo ý chí của mình để nắm giữ tài sản của mình nhưng không được trái pháp luật, đạo đức xã hội. B Chủ sở hữu được thực hiện mọi hành vi theo ý chí của mình để nắm giữ, chi phối tài sản của mình",C:"Chủ sở hữu được thực hiện mọi hành vi theo ý chí của mình để nắm giữ, chi phối tài sản của mình nhưng không được trái pháp luật, đạo đức xã hội.",D:"Chủ sở hữu được thực hiện mọi hành vi theo ý chí của mình để nắm giữ, chi phối tài sản của mình nhưng không được trái pháp luật."},a:"C"},
  {q:"Quyền sử dụng là quyền…...",o:{A:"hưởng hoa lợi từ tài sản.",B:"khai thác công dụng hưởng lợi tức từ tài sản.",C:"khai thác công dụng hưởng hoa lợi từ tài sản.",D:"khai thác công dụng hưởng hoa lợi, lợi tức từ tài sản."},a:"D"},
  {q:"Quyền định đoạt là quyền …...",o:{A:"chuyển giao quyền sở hữu tài sản, từ bỏ quyền sở hữu, tiêu dùng hoặc tiêu hủy tài sản.",B:"sở hữu tài sản, từ bỏ quyền sở hữu, tiêu dùng hoặc tiêu hủy tài sản.",C:"tiêu dùng hoặc tiêu hủy tài sản.",D:"tiêu hủy tài sản."},a:"A"},
  {q:"Bản Hiến pháp đầu tiên của nước ta là bản Hiến pháp năm nào?",o:{A:"1946",B:"1959",C:"1980",D:"1992"},a:"A"},
  {q:"Nhà nước liên bang là nhà nước......",o:{A:"có 2 chủ quyền chung",B:"có 1 chủ quyền chung cho toàn liên bang và có chủ quyền riêng cho mỗi thành viên",C:"Cả 2 câu trên đều đúng",D:"Cả 2 câu trên đều sai"},a:"B"},
  {q:"Theo Hiến pháp năm 2013 chức năng của Quốc hội là:",o:{A:"Thực hiện quyền lập hiến",B:"Thực hiện quyền lập pháp",C:"Quyết định những vấn đề quan trọng của đất nước và giám sát tối cao đối với hoạt động của Nhà nước",D:"Cả 3 câu trên đều đúng."},a:"D"},
  {q:"Hiến pháp năm 2013 quy định........................... thống lĩnh lực lượng vũ trang nhân dân",o:{A:"Bộ trưởng Bộ Quốc phòng.",B:"Thủ tướng Chính phủ..",C:"Chủ tịch nước.",D:"Chủ tịch Quốc hội."},a:"C"},
  {q:"Quyền khác đối với tài sản bao gồm......",o:{A:"Quyền đối với bất động sản liền kề, quyền sử dụng, quyền bề mặt",B:"Quyền đối với bất động sản liền kề, quyền hưởng dụng, quyền bề mặt",C:"Quyền đối với bất động sản liền kề, quyền hưởng thụ, quyền bề mặt",D:"Cả 3 câu trên đều sai."},a:"B"},
  {q:"Đối tượng của nghĩa vụ:",o:{A:"là tài sản phải thực hiện hoặc không được thực hiện.",B:"là công việc phải thực hiện hoặc không được thực hiện.",C:"là tài sản, công việc bắt buộc phải thực hiện hoặc không được thực hiện.",D:"là tài sản, công việc phải thực hiện hoặc không được thực hiện."},a:"D"},
  {q:"Hợp đồng chính là hợp đồng mà............",o:{A:"Hiệu lực có thể phụ thuộc vào hợp đồng phụ.",B:"Hiệu lực phụ thuộc vào hợp đồng phụ.",C:"Hiệu lực không bị ràng buộc vào hợp đồng phụ.",D:"Hiệu lực không phụ thuộc vào hợp đồng phụ."},a:"D"},
  {q:"Hợp đồng song vụ là......",o:{A:"hợp đồng mà mỗi bên đều có nghĩa vụ đối với nhau. Câu hỏi",B:"có 2 hợp đồng cùng song song nhau.",C:"Cả 2 câu trên đều đúng",D:"Cả 2 câu trên đều sai."},a:"A"},
  {q:"Địa điểm mở thừa kế là:.....",o:{A:"nơi cư trú cuối cùng của người để lại di sản",B:"nếu không xác định được nơi cư trú cuối cùng thì địa điểm mở thừa kế là nơi có toàn bộ di sản.",C:"nếu không xác định được nơi cư trú cuối cùng thì địa điểm mở thừa kế là nơi có toàn bộ di sản hoặc nơi có phần lớn di sản.",D:"Cả 3 câu trên đều sai."},a:"A"},
  {q:"Thời hiệu để người thừa kế yêu cầu chia di sản là .............. . đối với bất động sản, kể từ thời điểm mở thừa kế.",o:{A:"40 năm",B:"30 năm",C:"20 năm",D:"10 năm"},a:"B"},
  {q:"Thời hiệu để người thừa kế yêu cầu chia di sản là .............. . đối với động sản, kể từ thời điểm mở thừa kế.",o:{A:"10 năm",B:"20 năm",C:"30 năm",D:"Cả 3 câu trên đều sai."},a:"A"},
  {q:"Thời hiệu yêu cầu người thừa kế thực hiện nghĩa vụ về tài sản của người chết để lại là ........., kể từ thời điểm mở thừa kế.",o:{A:"01 năm",B:"03 năm",C:"05 năm",D:"10 năm"},a:"B"},
  {q:"Người từ đủ ...................................được lập di chúc, nếu được cha, mẹ hoặc người giám hộ đồng ý về việc lập di chúc.",o:{A:"mười bốn tuổi đến chưa đủ mười tám tuổi",B:"mười bốn tuổi đến chưa đủ hai mươi tuổi",C:"mười lăm tuổi đến chưa đủ hai mươi tuổi",D:"mười lăm tuổi đến chưa đủ mười tám tuổi"},a:"D"},
  {q:"Người thừa kế không phụ thuộc vào nội dung của di chúc .......",o:{A:"Con chưa thành niên, cha, mẹ, vợ, chồng;",B:"Con thành niên mà không có khả năng lao động.",C:"Cả 2 câu trên đều sai.",D:"Cả 2 câu trên đều đúng"},a:"A"},
  {q:"Thừa kế theo pháp luật",o:{A:"Thừa kế theo pháp luật là thừa kế theo hàng thừa kế, điều kiện và trình tự thừa kế do pháp luật quy định.",B:"Thừa kế theo pháp luật là thừa kế theo diện thừa kế, điều kiện và trình tự thừa kế do pháp luật quy định.",C:"Thừa kế theo pháp luật là thừa kế theo hàng thừa kế, điều kiện và quy trình thừa kế do pháp luật quy định.",D:"Cả 3 câu trên đều sai."},a:"A"},
  {q:"Sau .............., kể từ thời điểm di chúc miệng mà người lập di chúc còn sống, minh mẫn, sáng suốt thì di chúc miệng mặc nhiên bị hủy bỏ.",o:{A:"1 tuần",B:"1 tháng",C:"3 tháng",D:"Cả 3 câu trên đều sai."},a:"C"},
  {q:"Người thừa kế là cá nhân phải là người còn sống vào thời điểm mở thừa kế .................",o:{A:"hoặc sinh ra sau thời điểm mở thừa kế nhưng đã thành thai trước khi người để lại di sản chết.",B:"hoặc sinh ra và còn sống sau thời điểm mở thừa kế nhưng đã thành thai trước khi người để lại di sản chết.",C:"hoặc đã thành thai trước khi người để lại di sản chết.",D:"Cả 3 câu trên đều sai"},a:"B"},
  {q:"Thừa kế thế vị là trường hợp con của người để lại di sản chết .......... người để lại di sản thì cháu được hưởng phần di sản mà cha hoặc mẹ của cháu được hưởng nếu còn sống; nếu cháu cũng chết trước hoặc cùng một thời điểm với người để lại di sản thì chắt được hưởng phần di sản mà cha hoặc mẹ của chắt được hưởng nếu còn sống.",o:{A:"trước",B:"cùng một thời điểm",C:"trước hoặc cùng một thời điểm với",D:"Cả 3 câu trên đều sai"},a:"C"},
  {q:"Hội đồng nhân dân và Ủy ban nhân dân được tổ chức ở......................",o:{A:"cấp tỉnh, cấp huyện và cấp xã.",B:"cấp khu vực, cấp tỉnh, cấp huyện và cấp xã.",C:"cấp tỉnh, cấp huyện, cấp xã và cấp thôn.",D:"Cả 3 câu trên đều sai."},a:"A"},
  {q:"Về nguyên tắc, mỗi quy phạm pháp luật có các bộ phận sau:......................",o:{A:"giả định, quy định.",B:"giả định, quy định và chế tài.",C:"giả định và chế tài.",D:"Cả 3 câu trên đều sai."},a:"B"},

  {q:"Đối tượng điều chỉnh của luật dân sự là....................",o:{A:"quan hệ nhân thân",B:"quan hệ nhân thân và quan hệ tài sản",C:"quan hệ tài sản",D:"Cả 3 câu trên đều sai."},a:"B"},
  {q:"Cầm cố tài sản",o:{A:"là việc một bên (sau đây gọi là bên cầm cố) giao tài sản thuộc quyền sở hữu của mình cho bên kia (sau đây gọi là bên nhận cầm cố) để bảo đảm thực hiện nghĩa vụ.",B:"là việc một bên (sau đây gọi là bên cầm cố) giao tài sản cho bên kia (sau đây gọi là bên nhận cầm cố) để bảo đảm thực hiện nghĩa vụ.",C:"là việc một bên (sau đây gọi là bên cầm cố) giao tài sản thuộc quyền sở hữu của mình cho bên kia (sau đây gọi là bên nhận cầm cố) để thực hiện nghĩa vụ.",D:"Cả 3 câu trên đều sai."},a:"A"},
  {q:"Thế chấp tài sản ............",o:{A:"là việc một bên (sau đây gọi là bên thế chấp) dùng tài sản thuộc sở hữu của mình để thực hiện nghĩa vụ cho bên kia (sau đây gọi là bên nhận thế chấp).",B:"là việc một bên (sau đây gọi là bên thế chấp) dùng tài sản để bảo đảm thực hiện nghĩa vụ và giao tài sản cho bên kia (sau đây gọi là bên nhận thế chấp).",C:"là việc một bên (sau đây gọi là bên thế chấp) dùng tài sản thuộc sở hữu của mình để bảo đảm thực hiện nghĩa vụ và giao tài sản cho bên kia (sau đây gọi là bên nhận thế chấp).",D:"là việc một bên (sau đây gọi là bên thế chấp) dùng tài sản thuộc sở hữu của mình để bảo đảm thực hiện nghĩa vụ và không giao tài sản cho bên kia (sau đây gọi là bên nhận thế chấp)."},a:"D"},
  {q:"Đặt cọc................",o:{A:"là việc một bên (sau đây gọi là bên đặt cọc) giao cho bên kia (sau đây gọi là bên nhận đặt cọc) một khoản tiền để bảo đảm giao kết hoặc thực hiện hợp đồng.",B:"là việc một bên (sau đây gọi là bên đặt cọc) giao cho bên kia (sau đây gọi là bên nhận đặt cọc) một khoản tiền hoặc kim khí quý, đá quý hoặc vật có giá trị khác (sau đây gọi chung là tài sản đặt cọc) trong một thời hạn để bảo đảm giao kết hoặc thực hiện hợp đồng.",C:"là việc một bên (sau đây gọi là bên đặt cọc) giao cho bên kia (sau đây gọi là bên nhận đặt cọc) một khoản tiền hoặc kim khí quý, đá quý hoặc vật có giá trị khác (sau đây gọi chung là tài sản đặt cọc) để bảo đảm giao kết hoặc thực hiện hợp đồng.",D:"Cả 3 câu trên đều sai"},a:"B"},
  {q:"Ký cược.........",o:{A:"là việc bên thuê tài sản giao cho bên cho thuê một khoản tiền hoặc kim khí quý, đá quý hoặc vật có giá trị khác (sau đây gọi chung là tài sản ký cược) trong một thời hạn để bảo đảm việc trả lại tài sản thuê.",B:"là việc bên thuê tài sản là động sản giao cho bên cho thuê một khoản tiền hoặc kim khí quý, đá quý hoặc vật có giá trị khác (sau đây gọi chung là tài sản ký cược) trong một thời hạn nhất định để bảo đảm việc trả lại tài sản thuê.",C:"là việc bên thuê tài sản là động sản giao cho bên cho thuê một khoản tiền hoặc kim khí quý, đá quý hoặc vật có giá trị khác (sau đây gọi chung là tài sản ký cược) trong một thời hạn để bảo đảm việc trả lại tài sản thuê.",D:"Cả 3 câu trên đều sai"},a:"B"},
  {q:"Ký quỹ…...",o:{A:"là việc bên gửi một khoản tiền hoặc kim khí quý, đá quý hoặc giấy tờ có giá vào tài khoản phong tỏa tại một tổ chức tín dụng để bảo đảm việc thực hiện nghĩa vụ.",B:"là việc bên có nghĩa vụ gửi một khoản tiền hoặc kim khí quý, đá quý hoặc giấy tờ có giá tại một tổ chức tín dụng để bảo đảm việc thực hiện nghĩa vụ.",C:"là việc bên có nghĩa vụ gửi một khoản tiền hoặc kim khí quý, đá quý hoặc giấy tờ có giá vào tài khoản phong tỏa tại một tổ chức tín dụng để bảo đảm việc thực hiện nghĩa vụ.",D:"là việc bên có nghĩa vụ gửi một khoản tiền hoặc kim khí quý, đá quý hoặc giấy tờ có giá vào tài khoản tại một tổ chức tín dụng để bảo đảm việc thực hiện nghĩa vụ."},a:"C"},
  {q:"Trong hợp đồng mua bán, quyền sở hữu tài sản có thể ..............cho đến khi nghĩa vụ thanh toán được thực hiện đầy đủ.",o:{A:"được bên bán bảo lưu",B:"được bên mua bảo lưu",C:"được hai bên bảo lưu",D:"Tất cả các câu trên đều sai"},a:"A"},
  {q:"Bảo lãnh ........",o:{A:"là việc người thứ ba (sau đây gọi là bên bảo lãnh) sẽ thực hiện nghĩa vụ thay cho bên có nghĩa vụ (sau đây gọi là bên được bảo lãnh), nếu khi đến thời hạn thực hiện nghĩa vụ mà bên được bảo lãnh không thực hiện hoặc thực hiện không đúng nghĩa vụ.",B:"là việc người thứ ba (sau đây gọi là bên bảo lãnh) cam kết với bên có quyền (sau đây gọi là bên nhận bảo lãnh) sẽ thực hiện nghĩa vụ thay cho bên có nghĩa vụ (sau đây gọi là bên được bảo lãnh), nếu khi đến thời hạn thực hiện nghĩa vụ mà bên được bảo lãnh thực hiện không đúng nghĩa vụ.",C:"là việc người thứ ba (sau đây gọi là bên bảo lãnh) cam kết với bên có quyền (sau đây gọi là bên nhận bảo lãnh) sẽ thay cho bên có nghĩa vụ (sau đây gọi là bên được bảo lãnh), nếu khi đến thời hạn thực hiện nghĩa vụ mà bên được bảo lãnh không thực hiện hoặc thực hiện không đúng nghĩa vụ.",D:"là việc người thứ ba (sau đây gọi là bên bảo lãnh) cam kết với bên có quyền (sau đây gọi là bên nhận bảo lãnh) sẽ thực hiện nghĩa vụ thay cho bên có nghĩa vụ (sau đây gọi là bên được bảo lãnh), nếu khi đến thời hạn thực hiện nghĩa vụ mà bên được bảo lãnh không thực hiện hoặc thực hiện không đúng nghĩa vụ."},a:"D"},
  {q:"Tổ chức chính trị - xã hội ở cơ sở có thể bảo đảm ....................một khoản tiền tại tổ chức tín dụng để sản xuất, kinh doanh, tiêu dùng theo quy định của pháp luật.",o:{A:"cho cá nhân, hộ gia đình nghèo vay",B:"bằng tín chấp cho cá nhân, hộ gia đình nghèo vay",C:"bằng tín chấp cho cá nhân nghèo vay",D:"bằng tín chấp cho cá nhân nghèo vay"},a:"B"},
  {q:"Cầm giữ tài sản",o:{A:"là việc bên có quyền (sau đây gọi là bên cầm giữ) đang nắm giữ tài sản là đối tượng của hợp đồng song vụ được chiếm giữ tài sản trong trường hợp bên có nghĩa vụ không thực hiện hoặc thực hiện không đúng nghĩa vụ.",B:"là việc bên có quyền (sau đây gọi là bên cầm giữ) đang nắm giữ tài sản là đối tượng của hợp đồng được chiếm giữ tài sản trong trường hợp bên có nghĩa vụ không thực hiện hoặc thực hiện không đúng nghĩa vụ.",C:"là việc bên có quyền (sau đây gọi là bên cầm giữ) đang nắm giữ hợp pháp tài sản là đối tượng của hợp đồng được chiếm giữ tài sản trong trường hợp bên có nghĩa vụ không thực hiện hoặc thực hiện không đúng nghĩa vụ.",D:"là việc bên có quyền (sau đây gọi là bên cầm giữ) đang nắm giữ hợp pháp tài sản là đối tượng của hợp đồng song vụ được chiếm giữ tài sản trong trường hợp bên có nghĩa vụ không thực hiện hoặc thực hiện không đúng nghĩa vụ."},a:"D"},

  {q:"Người sử dụng lao động không được thực hiện quyền đơn phương chấm dứt hợp đồng lao động trong trường hợp................",o:{A:"Người lao động đang nghỉ hằng năm",B:"Người lao động đang nghỉ hằng năm, nghỉ việc riêng và trường hợp nghỉ khác được người sử dụng lao động đồng ý.",C:"Người lao động đang nghỉ việc riêng và trường hợp nghỉ khác được người sử dụng lao động đồng ý.",D:"Người lao động đang nghỉ hằng năm và trường hợp nghỉ khác được người sử dụng lao động đồng ý."},a:"B"},

  {q:"Công dân Việt Nam kết hôn với người nước ngoài hoặc với người định cư ở nước ngoài phải thực hiện đăng ký kết hôn tại ................",o:{A:"UBND cấp xã",B:"UBND cấp huyện",C:"UBND cấp tỉnh",D:"Cả 3 câu trên đều đúng"},a:"B"},
  {q:"..................... là cơ quan duy nhất có trách nhiệm ra phán quyết chấm dứt quan hệ hôn nhân của vợ chồng",o:{A:"UBND cấp xã",B:"UBND cấp huyện",C:"UBND cấp tỉnh",D:"Tòa án"},a:"D"},
  {q:"Vợ không có quyền yêu cầu ly hôn trong trường hợp",o:{A:"vợ đang có thai",B:"vợ sinh con",C:"vợ đang nuôi con dưới 12 tháng tuổi",D:"Cả 3 câu trên đều sai."},a:"D"},
  {q:"Khi ly hôn phải xét nguyện vọng của con nếu con từ đủ.............",o:{A:"6 tuổi",B:"7 tuổi",C:"14 tuổi",D:"16 tuổi"},a:"B"}
];
const PAGE_SIZE = 20;
let userAnswers = {};
let revealed = {};
let currentFilter = 'all';
let currentSearch = '';
let currentPage = 1;
let filtered = [];

function getFiltered() {
  let qs = QUESTIONS.map((q,i)=>({...q,idx:i}));
  if(currentFilter==='unanswered') qs=qs.filter(q=>!userAnswers[q.idx]);
  else if(currentFilter==='correct') qs=qs.filter(q=>userAnswers[q.idx]&&q.a&&userAnswers[q.idx]===q.a);
  else if(currentFilter==='wrong') qs=qs.filter(q=>userAnswers[q.idx]&&q.a&&userAnswers[q.idx]!==q.a);
  if(currentSearch) qs=qs.filter(q=>q.q.toLowerCase().includes(currentSearch.toLowerCase()));
  return qs;
}

function render() {
  filtered = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filtered.length/PAGE_SIZE));
  if(currentPage>totalPages) currentPage=1;
  const pageItems = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  
  const container = document.getElementById('quizContainer');
  if(pageItems.length===0){container.innerHTML='<div class="empty">Không có câu hỏi phù hợp</div>';return;}
  
  container.innerHTML = pageItems.map((q,pi)=>{
    const qi = q.idx;
    const ua = userAnswers[qi];
    const rv = revealed[qi];
    const opts = ['A','B','C','D'].filter(k=>q.o[k]);
    
    return `<div class="question-card" id="qcard-${qi}">
      <div class="q-header">
        <div class="q-num">${(currentPage-1)*PAGE_SIZE+pi+1}</div>
        <div class="q-text">${q.q}</div>
      </div>
      <div class="options">
        ${opts.map(k=>{
          let cls='option';
          if(ua===k){
            if(q.a){cls+= (k===q.a)?' correct':' wrong';}
            else cls+=' selected';
          } else if(rv&&q.a&&k===q.a) cls+=' correct';
          return `<div class="${cls}" onclick="choose(${qi},'${k}')" id="opt-${qi}-${k}">
            <div class="opt-badge">${k}</div>
            <div class="opt-text">${q.o[k]}</div>
          </div>`;
        }).join('')}
      </div>
      ${(ua&&q.a)?`<div class="result-box show ${ua===q.a?'result-correct':'result-wrong'}">${ua===q.a?'✅ Chính xác!':'❌ Sai rồi! Đáp án đúng: <strong>'+q.a+'</strong>'}</div>`:''}</div>`;
  }).join('');
  
  renderPagination(totalPages);
  updateStats();
}

function renderPagination(total) {
  const p = document.getElementById('pagination');
  if(total<=1){p.innerHTML='';return;}
  let html='';
  for(let i=1;i<=total;i++) html+=`<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  p.innerHTML=html;
}

function goPage(n){currentPage=n;render();window.scrollTo(0,0);}

function choose(qi, key){
  if(revealed[qi]) return;
  userAnswers[qi]=key;
  render();
}

function updateStats(){
  const total=QUESTIONS.length;
  const answered=Object.keys(userAnswers).length;
  const correct=QUESTIONS.filter((q,i)=>q.a&&userAnswers[i]===q.a).length;
  const wrong=QUESTIONS.filter((q,i)=>q.a&&userAnswers[i]&&userAnswers[i]!==q.a).length;
  const pct=answered>0?Math.round(correct/answered*100):0;
  document.getElementById('totalQ').textContent=total;
  document.getElementById('answeredQ').textContent=answered;
  document.getElementById('correctQ').textContent=correct;
  document.getElementById('wrongQ').textContent=wrong;
  document.getElementById('pctQ').textContent=pct+'%';
  document.getElementById('progressFill').style.width=(answered/total*100)+'%';
}

function filterTab(f, el){
  currentFilter=f; currentPage=1;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function handleSearch(){
  currentSearch=document.getElementById('searchInput').value;
  currentPage=1; render();
}

function submitAll(){
  const total=QUESTIONS.length;
  const answered=Object.keys(userAnswers).length;
  const withAns=QUESTIONS.filter((q,i)=>q.a).length;
  const correct=QUESTIONS.filter((q,i)=>q.a&&userAnswers[i]===q.a).length;
  if(answered<total*0.5 && !confirm('Bạn mới trả lời '+answered+'/'+total+' câu. Tiếp tục nộp bài?')) return;
  QUESTIONS.forEach((_,i)=>revealed[i]=true);
  const pct=withAns>0?Math.round(correct/withAns*100):0;
  document.getElementById('modalScore').textContent=pct+'%';
  document.getElementById('modalDetail').textContent=correct+'/'+withAns+' câu đúng';
  document.getElementById('modalEmoji').textContent=pct>=80?'🏆':pct>=60?'👍':'📚';
  document.getElementById('resultModal').classList.add('show');
  render();
}

function closeModal(){document.getElementById('resultModal').classList.remove('show');}

function resetAll(){
  userAnswers={};revealed={};
  closeModal();currentFilter='all';currentPage=1;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===0));
  render();
}

function shuffleQuestions(){
  for(let i=QUESTIONS.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [QUESTIONS[i],QUESTIONS[j]]=[QUESTIONS[j],QUESTIONS[i]];
  }
  userAnswers={};revealed={};currentPage=1;render();
}

function showAll(){
  QUESTIONS.forEach((_,i)=>revealed[i]=true);
  render();
}

render();
</script>
